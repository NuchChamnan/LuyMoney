name: luy_money
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  build_runner: ^2.4.13
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.3.0
  connectivity_plus: ^7.1.1
  data_table_2: ^2.7.2
  firebase_analytics: ^12.3.0
  firebase_app_check: ^0.4.4
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_html: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_local_notifications: ^21.0.0
  flutter_native_splash: ^2.4.7
  flutter_quill: ^11.5.0
  flutter_stripe: ^12.6.0
  flutter_svg: ^2.3.0
  get: ^4.7.3
  get_storage: ^2.1.1
  google_fonts: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  image_picker: ^1.2.2
  in_app_review: ^2.0.11
  intl: ^0.20.2
  lottie: ^3.3.3
  markdown_widget: ^2.3.2+8
  mockito: ^5.4.4
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  shimmer: ^3.0.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  video_player: ^2.11.1
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/flags/
    - assets/images/
    - assets/lottie/
    - .env
    - .env.dev
    - .env.staging
    - .env.prod

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  color: "#0A0A0A"
  image: assets/images/splash_logo.png
  android: true
  ios: true
